# gsm.utils GHA version: 0.3.0
# Generated by: https://github.com/Gilead-BioStats/gsm.utils
# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Description: R CMD check for PRs
on:
  pull_request:
    branches: [main, dev]

name: R-CMD-check

permissions: read-all

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Define matrix based on target branch
        id: set-matrix
        uses: gilead-biostats/gsm.utils/actions/setup-matrix-with-dev@fix-74-R-CMD-check
        with:
          pkg-use: 'wide'

  R-CMD-check:
    needs: setup-matrix
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.setup-matrix.outputs.matrix) }}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Remove astgrepr from DESCRIPTION (not available for R < 4.2)
        if: matrix.config.r == 'oldrel-4'
        shell: bash
        run: sed -i.bak '/astgrepr/d' DESCRIPTION

      - name: Install R and dependencies
        uses: gilead-biostats/gsm.utils/actions/install@actions-v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true
          extra-packages: any::rcmdcheck
          needs: check

      - name: Restore DESCRIPTION file
        if: matrix.config.r == 'oldrel-4'
        shell: bash
        run: mv DESCRIPTION.bak DESCRIPTION

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'

# name: pkgdown-all.yaml
# version: 0.3.2
# Description: Triggers the core pkgdown deployment and cleanup workflows.

name: pkgdown-all

on:
  push:
    branches: [main, dev]
  pull_request:
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:
    inputs:
      mode:
        description: "Mode to run: deploy or cleanup"
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - cleanup
      pr-number:
        description: "Pull request number. Leave blank to deploy to a branch."
        required: false
        type: string
      pkgdown-dev-mode:
        description: "Whether pkgdown should operate in dev mode."
        required: false
        type: boolean
        default: false

jobs:
  call-pkgdown-core:
    uses: Gilead-BioStats/gsm.utils/.github/workflows/pkgdown-core.yaml@fix-78-comment-pr
    with:
      mode: ${{ inputs.mode || 'deploy' }}
      pr-number: ${{ inputs.pr-number || '' }}
      pkgdown-dev-mode: ${{ inputs.pkgdown-dev-mode == true }}
    secrets: inherit

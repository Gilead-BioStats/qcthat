# gsm.utils GHA version: 0.3.0
# Generated by: https://github.com/Gilead-BioStats/gsm.utils
# Description: Deploy pkgdown site with assets (such as examples and slide decks).

on:
  push:
    branches: [main, dev]
  pull_request:
  workflow_dispatch:

name: pkgdown-assets

jobs:
  pkgdown-assets:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Build and deploy pkgdown site
        uses: gilead-biostats/gsm.utils/.github/actions/pkgdown-assets@actions-v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          verbose: false

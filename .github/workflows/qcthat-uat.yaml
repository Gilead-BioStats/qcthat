# Workflow derived from
# https://github.com/Gilead-BioStats/qcthat/tree/v1.1.0/inst/workflows/qcthat-uat.yaml.
on:
  issues:
    types: [closed]

name: UAT Manager

permissions:
  # to view status of other issues
  issues: read
  # to find connected UAT issues
  pull-requests: read
  # to re-trigger the `qcthat-pr_issues` workflow.
  actions: write

jobs:
  qcthat-uat_manager:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'qcthat-uat')
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: local::.

      - name: Run UAT Manager
        run: |
          Rscript -e "qcthat::TriggerUAT(${{ github.event.issue.number }})"

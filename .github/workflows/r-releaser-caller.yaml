# name: r-releaser-caller.yaml
# version: 0.3.3
# Description: R package release workflow
name: Release

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to release
        required: true

jobs:
  call-release-workflow:
    uses: Gilead-BioStats/gsm.utils/.github/workflows/r-releaser.yaml@fix-78-comment-pr
    with:
      tag: ${{ github.event.release.tag_name || inputs.tag }}
    secrets: inherit

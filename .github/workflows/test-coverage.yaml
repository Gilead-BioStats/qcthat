# name: test-coverage.yaml
# version: 0.3.6
# Description: Compute test coverage and publish coverage-summary.json artifact
name: test-coverage
on:
  push:
    branches: [main, dev]
  pull_request:
    types: [opened, synchronize, reopened]
  release:
    types: [published]
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  call-test-coverage-core:
    uses: Gilead-BioStats/gsm.utils/.github/workflows/test-coverage-core.yaml@fix-78-comment-pr
    secrets: inherit

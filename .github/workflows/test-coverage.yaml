# gsm.utils GHA version: 0.3.0
# Generated by: https://github.com/Gilead-BioStats/gsm.utils
# Description: Compute test coverage; log results, post sticky PR comments, and attach coverage-summary.json to releases

on:
  push:
    branches: [main, dev]
  pull_request:
    types: [opened, synchronize, reopened]
  release:
    types: [published]
  workflow_dispatch:

name: test-coverage

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Install R and dependencies
        uses: gilead-biostats/gsm.utils/actions/install@actions-v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          use-public-rspm: true
          extra-packages: any::covr any::xml2 local::. Gilead-BioStats/gsm.utils
          needs: coverage

      - name: Compute coverage
        shell: Rscript {0}
        run: |
          pct <- tryCatch(
            {
              cov <- covr::package_coverage()
              df <- as.data.frame(cov)
              file_pct <- tapply(df$value > 0, df$filename, function(x) round(100 * mean(x), 1))
              file_data <- data.frame(
                file = names(file_pct),
                coverage = as.numeric(file_pct),
                stringsAsFactors = FALSE
              )
              file_data <- file_data[order(file_data$file), ]
              jsonlite::write_json(file_data, "coverage-data.json", auto_unbox = TRUE)
              as.numeric(covr::percent_coverage(cov))
            },
            error = function(e) {
              message("Coverage computation failed: ", conditionMessage(e))
              NA_real_
            }
          )
          cat(
            sprintf("COVERAGE_PCT=%s\n", if (is.na(pct)) "NA" else sprintf("%.2f", pct)),
            file = Sys.getenv("GITHUB_ENV"),
            append = TRUE
          )

      - name: Log coverage
        run: |
          echo "Coverage: ${{ env.COVERAGE_PCT }}%"

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const pct = process.env.COVERAGE_PCT;
            const sha = context.sha.slice(0, 7);
            const timestamp = new Date().toISOString().replace(/\.\d{3}Z$/, 'Z');
            const marker = '<!-- coverage-comment -->';
            let fileTable = '';
            try {
              const fileData = JSON.parse(fs.readFileSync('coverage-data.json', 'utf8'));
              const rows = fileData.map(f => `| \`${f.file}\` | ${f.coverage}% |`).join('\n');
              fileTable = `\n\n<details>\n<summary>Per-file coverage</summary>\n\n| File | Coverage |\n|------|----------|\n${rows}\n\n</details>`;
            } catch (e) {}
            const body = pct === 'NA'
              ? `${marker}\n⚠️ Coverage computation failed.\n\n_Commit: ${sha} | ${timestamp}_`
              : `${marker}\n📊 Test coverage: **${pct}%**${fileTable}\n\n_Commit: ${sha} | ${timestamp}_`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Write coverage-summary.json
        if: github.event_name == 'release'
        shell: Rscript {0}
        # allow_fail defaults to FALSE — coverage failures intentionally abort the release workflow
        run: |
          gsm.utils::emit_coverage_summary(
            output_path = "coverage-summary.json",
            quiet       = FALSE
          )

      - name: Attach coverage summary to release
        if: github.event_name == 'release'
        run: gh release upload ${{ github.event.release.tag_name }} coverage-summary.json --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
